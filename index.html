<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Pokemon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="./src/css/scrollbar.css">
    <script src="./src/js/index.js" defer></script>
</head>
<body>
    <header>
        <a href="https://otpokemon.com" target="_blank">
        <img src="./src/images/pokeball.png" alt="Pokebola" class="logo"></a>
        <button id="botao-alterar-tema">
            <img src="./src/images/sun.png" alt="Imagem do sol" class="imagem-botao">
        </button>
    </header>
    <main>
        <section class="barra-filtros" aria-label="Filtros de Pokemon">
            <input
                type="search"
                id="busca-pokemon"
                class="campo-filtro"
                placeholder="Pesquisar Pokemon por nome..."
                aria-label="Pesquisar Pokemon por nome"
            >

            <select id="filtro-tipo" class="campo-filtro" aria-label="Filtrar por tipo">
                <option value="todos">Todos os tipos</option>
            </select>

            <select id="filtro-regiao" class="campo-filtro" aria-label="Filtrar por regiao">
                <option value="kanto">Kanto</option>
                <option value="johto">Johto</option>
                <option value="hoenn">Hoenn</option>
                <option value="sinnoh">Sinnoh</option>
                <option value="unova">Unova</option>
                <option value="kalos">Kalos</option>
                <option value="alola">Alola</option>
                <option value="galar">Galar</option>
                <option value="paldea">Paldea</option>
            </select>
        </section>

        <ul class="listagem-pokemon"></ul>
    </main>

    <section id="modal-pokemon" class="modal-overlay" hidden>
        <div class="modal-conteudo" role="dialog" aria-modal="true" aria-labelledby="modal-pokemon-nome">
            <button id="modal-fechar" class="modal-fechar" type="button" aria-label="Fechar modal">
                <span class="material-symbols-outlined" aria-hidden="true">close</span>
            </button>

            <header class="modal-topo">
                <div class="modal-titulo">
                    <h2 id="modal-pokemon-nome"></h2>
                    <span id="modal-pokemon-numero"></span>
                </div>
                <img id="modal-pokemon-sprite" class="modal-sprite" alt="Sprite do Pokemon">
            </header>

            <section class="modal-status-bloco" aria-label="Status base do Pokemon">
                <h3>Status Base</h3>
                <ul id="modal-pokemon-status" class="modal-status-lista"></ul>
            </section>

            <section class="modal-sprites-bloco" aria-label="Sprites extras do Pokemon">
                <h3>Sprites Extras</h3>
                <ul id="modal-pokemon-sprites" class="modal-sprites-lista"></ul>
            </section>
        </div>
    </section>
</body>
</html>
